apiVersion: apps/v1
kind: Deployment

metadata:
  name: product-service


spec:

  replicas: 2


  selector:
    matchLabels:
      app: product-service


  template:

    metadata:
      labels:
        app: product-service


    spec:

      containers:

      - name: product-service

        image: manish28/product-service:latest

        ports:
        - containerPort: 8080


        env:

        - name: SPRING_PROFILES_ACTIVE
          value: prod


        envFrom:

        - configMapRef:
            name: product-config


        - secretRef:
            name: product-secret


        readinessProbe:

          httpGet:
            path: /actuator/health/readiness
            port: 8080

          initialDelaySeconds: 20
          periodSeconds: 10


        livenessProbe:

          httpGet:
            path: /actuator/health/liveness
            port: 8080

          initialDelaySeconds: 30
          periodSeconds: 20